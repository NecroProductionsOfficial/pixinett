<style>
/* 2. Стили под дизайн KNOX STATION */
#pixie-menu-btn {

    height: 50px;
    cursor: pointer;
    z-index: 2000;
    transition: 0.3s;
}

#pixie-menu-btn img {
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
}

#pixie-sidebar {
    position: fixed;
    top: 0;
    left: -300px; /* Спрятано слева */
    width: 280px;
    height: 100%;
    background: rgba(255, 255, 255, 0.1); /* Прозрачный эффект стекла */
    backdrop-filter: blur(15px);
    border-right: 1px solid rgba(255, 255, 255, 0.2);
    z-index: 2001;
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    color: white;
}

#pixie-sidebar.active {
    left: 0; /* Выезжает слева направо */
}

.pixie-header {

    padding-bottom: 20px;

}

.pixie-header img {
    width: 80px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.pixie-nav {
    list-style: none;
    padding: 0;
}

.pixie-nav li a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.05);
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.2s;
}

.pixie-nav li a:hover {
    background: rgba(0, 162, 255, 0.3);
    padding-left: 25px;
}

#pixie-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);

    z-index: 1999;
}

#pixie-overlay.active { display: block; }
</style>

<script>
