<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixie-Net | Управление</title>
    <style>
        body { background: #fff0f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .box { background: white; padding: 40px; border-radius: 30px; border: 4px solid #ffccd5; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2); transition: 0.3s; }
        h1 { color: #ff85a2; margin-bottom: 20px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ffe4e9; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        input:focus { border-color: #ffb6c1; background: #fff9fa; }
        button { width: 100%; background: #ffb6c1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.2s; }
        button:hover { background: #ff85a2; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .link { color: #ff85a2; cursor: pointer; font-size: 13px; margin-top: 20px; display: block; text-decoration: underline; }
        .status { font-size: 13px; margin-top: 15px; min-height: 18px; color: #888; }
        
        /* Стили для панелей */
        #admin-panel, #user-panel { display: none; }
        .invite-box { background: #f0f8ff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 2px dashed #a2d2ff; font-family: monospace; color: #4a90e2; font-weight: bold; font-size: 18px; }
        hr { border: 0; border-top: 2px solid #ffe4e9; margin: 20px 0; }
    </style>
</head>
<body>

<div class="box" id="auth-panel">
    <h1 id="title">Вход</h1>
    <input type="text" id="username" placeholder="Логин">
    <input type="password" id="password" placeholder="Пароль">
    
    <div id="reg-fields" style="display: none;">
        <input type="text" id="invite" placeholder="Введите инвайт-код">
    </div>

    <button onclick="submitData()" id="main-btn">ПРОДОЛЖИТЬ</button>
    
    <span class="link" id="toggle-mode" onclick="toggleMode()">Нет аккаунта? Регистрация</span>
    <div class="status" id="status-text">Введите данные для доступа</div>
</div>

<div class="box" id="admin-panel">
    <h1>Админ-панель</h1>
    <p>Добро пожаловать, <span id="admin-name" style="color:#ff85a2; font-weight:bold;"></span>!</p>
    <hr>
    <p style="font-size: 14px; color: #666;">Генерация ключей для друзей:</p>
    <button onclick="generateCode()" style="background: #a2d2ff;">СОЗДАТЬ ИНВАЙТ</button>
    <div id="invite-display" class="invite-box" style="display: none;"></div>
    
    <button onclick="location.reload()" style="background: #ffccd5; margin-top: 30px;">ВЫЙТИ</button>
</div>

<div class="box" id="user-panel">
    <h1>Pixie-Net</h1>
    <p>Рады видеть тебя, <br><span id="user-display-name" style="color:#ff85a2; font-weight:bold; font-size: 20px;"></span>!</p>
    <p style="color: #888; font-size: 14px;">Статус: Участник сети</p>
    <hr>
    <button onclick="location.reload()" style="background: #ccc;">ВЫЙТИ ИЗ СИСТЕМЫ</button>
</div>

<script>
    // Твоя ссылка на Pipedream
    const api = "https://eo4rau8gkt8py2a.m.pipedream.net";
    let isLoginMode = true;

    // Переключение между Входом и Регистрацией
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "Вход" : "Регистрация";
        document.getElementById('main-btn').innerText = isLoginMode ? "ПРОДОЛЖИТЬ" : "СОЗДАТЬ АККАУНТ";
        document.getElementById('reg-fields').style.display = isLoginMode ? "none" : "block";
        document.getElementById('toggle-mode').innerText = isLoginMode ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
        document.getElementById('status-text').innerText = "";
    }

    // Основная функция отправки
    async function submitData() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const inv = document.getElementById('invite').value;
        const st = document.getElementById('status-text');

        if (!u || !p) {
            st.innerText = "⚠️ Заполни логин и пароль!";
            st.style.color = "red";
            return;
        }

        if (!isLoginMode && !inv) {
            st.innerText = "⚠️ Для регистрации нужен инвайт!";
            st.style.color = "red";
            return;
        }

        st.innerText = "Соединение...";
        st.style.color = "#888";

        try {
            const response = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: isLoginMode ? 'login' : 'register',
                    user: u,
                    pass: p,
                    invite: inv
                })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('auth-panel').style.display = 'none';
                
                if (data.isAdmin) {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('admin-name').innerText = u;
                } else {
                    document.getElementById('user-panel').style.display = 'block';
                    document.getElementById('user-display-name').innerText = u;
                }
            } else {
                st.innerText = "❌ " + data.message;
                st.style.color = "red";
            }
        } catch (error) {
            st.innerText = "❌ Ошибка сервера. Проверь Pipedream!";
            st.style.color = "red";
        }
    }

    // Функция генерации кода (только из админки)
    async function generateCode() {
        const display = document.getElementById('invite-display');
        display.style.display = "block";
        display.innerText = "Генерация...";

        try {
            const response = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'generateCode' })
            });
            const data = await response.json();
            if (data.success) {
                display.innerText = data.code;
            }
        } catch (e) {
            display.innerText = "Ошибка!";
        }
    }
</script>

</body>
</html>
