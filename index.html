<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixie-Net | System</title>
    <style>
        body { background: #fff0f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .box { background: white; padding: 40px; border-radius: 30px; border: 4px solid #ffccd5; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #ff85a2; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ffe4e9; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffb6c1; }
        button { width: 100%; background: #ffb6c1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        button:hover { background: #ff85a2; }
        .link { color: #ff85a2; cursor: pointer; font-size: 13px; margin-top: 15px; display: block; text-decoration: underline; }
        #admin-box, #welcome-screen { display: none; }
        .invite-display { background: #f0f8ff; padding: 10px; border-radius: 10px; margin-top: 10px; font-family: monospace; border: 1px dashed #a2d2ff; }
    </style>
</head>
<body>

<div class="box" id="auth-box">
    <h1 id="auth-title">Вход</h1>
    <input type="text" id="u" placeholder="Логин">
    <input type="password" id="p" placeholder="Пароль">
    <input type="text" id="inv" placeholder="Инвайт-код (для регистрации)" style="display:none;">
    
    <button onclick="handleAuth()" id="auth-btn">ВОЙТИ</button>
    
    <span class="link" id="toggle-link" onclick="toggleMode()">Нет аккаунта? Регистрация</span>
    <p id="status" style="font-size: 13px; color: #888; margin-top: 10px;"></p>
</div>

<div class="box" id="admin-box">
    <h1>Админ-панель</h1>
    <p>Добро пожаловать, <span id="admin-name"></span>!</p>
    <hr style="border: 1px solid #ffe4e9;">
    <button onclick="generateInvite()" style="background:#a2d2ff;">Создать инвайт-код</button>
    <div id="invite-result" class="invite-display" style="display:none;"></div>
    <button onclick="location.reload()" style="background:#ffccd5; margin-top: 20px;">ВЫЙТИ</button>
</div>

<div class="box" id="user-box" style="display:none;">
    <h1>Pixie-Net</h1>
    <p>Привет, <span id="user-name"></span>! У тебя статус: Пользователь.</p>
    <button onclick="location.reload()" style="background:#ccc;">ВЫЙТИ</button>
</div>

<script>
    const api = "https://eo4rau8gkt8py2a.m.pipedream.net";
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Вход" : "Регистрация";
        document.getElementById('auth-btn').innerText = isLogin ? "ВОЙТИ" : "СОЗДАТЬ АККАУНТ";
        document.getElementById('inv').style.display = isLogin ? "none" : "block";
        document.getElementById('toggle-link').innerText = isLogin ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
    }

    async function handleAuth() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const invite = document.getElementById('inv').value;
        const st = document.getElementById('status');

        if(!u || !p) return alert("Заполни поля!");

        st.innerText = "Обработка...";

        const payload = {
            action: isLogin ? 'login' : 'register',
            user: u,
            pass: p,
            invite: invite
        };

        try {
            const res = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('auth-box').style.display = 'none';
                if (data.isAdmin) {
                    document.getElementById('admin-box').style.display = 'block';
                    document.getElementById('admin-name').innerText = u;
                } else {
                    document.getElementById('user-box').style.display = 'block';
                    document.getElementById('user-name').innerText = u;
                }
            } else {
                st.innerText = "Ошибка: " + data.message;
            }
        } catch (e) {
            st.innerText = "Ошибка связи с сервером.";
        }
    }

    async function generateInvite() {
        const res = await fetch(api, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'generateCode' })
        });
        const data = await res.json();
        if (data.success) {
            const el = document.getElementById('invite-result');
            el.style.display = "block";
            el.innerText = "КОД: " + data.code;
        }
    }
</script>
</body>
</html>
