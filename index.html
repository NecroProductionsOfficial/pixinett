<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnoxStation | Pixie Edition</title>
    <style>
        :root {
            --aero-blue: #007bff;
            --glass: rgba(255, 255, 255, 0.2);
            --border-glass: rgba(255, 255, 255, 0.4);
            --font: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font);
            background: linear-gradient(135deg, #82caff 0%, #007bff 50%, #004a99 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: white;
        }

        /* Анимированные пузырьки */
        .bubbles { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; }
        .bubble { position: absolute; background: rgba(255,255,255,0.2); border-radius: 50%; bottom: -100px; animation: rise 10s infinite; }
        @keyframes rise { 
            0% { transform: translateY(0) scale(1); opacity: 0; } 
            50% { opacity: 0.5; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } 
        }

        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-glass);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        .auth-btn {
            background: linear-gradient(180deg, #fff 0%, #a2d9ff 50%, #007bff 100%);
            color: #004a99;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* КНОПКА-ЧУДИК (Скрыта по умолчанию) */
        #pixie-trigger {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 1500;
            display: none; /* СКРЫТО */
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #pixie-trigger img { width: 100%; border-radius: 15px; border: 2px solid var(--border-glass); }

        /* БОКОВАЯ ПАНЕЛЬ */
        #pixie-sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            background: rgba(0, 123, 255, 0.25);
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-glass);
            z-index: 2500;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #pixie-sidebar.active { left: 0; }

        .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-header img { width: 100px; margin-bottom: 15px; }

        .sidebar-menu { list-style: none; padding: 20px; margin: 0; }
        .sidebar-menu li {
            padding: 15px; margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px; cursor: pointer; text-align: center;
        }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: rgba(255,255,255,0.2); backdrop-filter: blur(30px); border-radius: 30px; padding: 40px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; }

        /* ПАНЕЛИ */
        .main-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px); border-radius: 40px; padding: 50px; text-align: center; width: 80%; max-width: 600px; }
        
        #admin-panel, #user-panel, #pixie-overlay { display: none; }
        #pixie-overlay.active { display: block; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:2400; }
    </style>
</head>
<body>

<div class="bubbles" id="bubble-container"></div>

<nav>
    <div class="logo">KNOX STATION</div>
    <div class="nav-menu">
        <button class="auth-btn" onclick="openModal()">ВХОД / РЕГИСТРАЦИЯ</button>
    </div>
</nav>

<div id="pixie-trigger" onclick="toggleMenu()">
    <img src="Gemini_Generated_Image_ppv98ippv98ippv9.jpg" alt="Pixie">
</div>

<div id="pixie-overlay" onclick="toggleMenu()"></div>

<div id="pixie-sidebar">
    <div class="sidebar-header">
        <img src="Gemini_Generated_Image_ppv98ippv98ippv9.jpg" alt="Logo">
        <h3>Pixie System</h3>
    </div>
    <ul class="sidebar-menu">
        <li>Статистика ESP32</li>
        <li style="color: #ff9999;" onclick="location.reload()">Выход</li>
    </ul>
</div>

<div id="landing" class="main-container">
    <div class="glass-panel">
        <h1>Добро пожаловать</h1>
        <p>Войдите, чтобы управлять станцией.</p>
    </div>
</div>

<div class="modal" id="auth-modal">
    <div class="modal-content">
        <h2>Вход</h2>
        <input type="text" id="u" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button class="auth-btn" style="width:100%;" onclick="fakeLogin()">ВОЙТИ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:white; margin-top:10px; cursor:pointer;">Отмена</button>
    </div>
</div>

<div id="admin-panel" class="main-container">
    <div class="glass-panel">
        <h1>Админ-панель</h1>
        <p>Теперь тебе доступна вкладка слева!</p>
        <button class="auth-btn" onclick="location.reload()">ВЫЙТИ</button>
    </div>
</div>

<script>
    // Пузырьки
    const container = document.getElementById('bubble-container');
    for (let i = 0; i < 15; i++) {
        const b = document.createElement('div'); b.className = 'bubble';
        const size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(b);
    }

    function openModal() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('auth-modal').style.display = 'none'; }

    // Функция входа (имитация)
    function fakeLogin() {
        const user = document.getElementById('u').value;
        if(user) {
            closeModal();
            document.getElementById('landing').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
            
            // ПОКАЗЫВАЕМ КНОПКУ-ЧУДИКА ТОЛЬКО ТУТ
            document.getElementById('pixie-trigger').style.display = 'block';
        } else {
            alert("Введите логин!");
        }
    }

    function toggleMenu() {
        document.getElementById('pixie-sidebar').classList.toggle('active');
        document.getElementById('pixie-overlay').classList.toggle('active');
    }
</script>

</body>
</html>
