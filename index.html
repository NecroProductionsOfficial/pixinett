<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixie-Net Control Center</title>
    <style>
        body { background: #fff0f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .box { background: white; padding: 40px; border-radius: 30px; border: 4px solid #ffccd5; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); }
        h1 { color: #ff85a2; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ffe4e9; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffb6c1; background: #fff9fa; }
        button { width: 100%; background: #ffb6c1; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.2s; }
        button:hover { background: #ff85a2; transform: translateY(-2px); }
        .link { color: #ff85a2; cursor: pointer; font-size: 13px; margin-top: 20px; display: block; text-decoration: underline; }
        .status { font-size: 13px; margin-top: 15px; min-height: 1.2em; }
        
        /* Стили для панелей */
        #admin-panel, #user-panel, #reg-section { display: none; }
        .invite-display { background: #f0f8ff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 2px dashed #a2d2ff; font-family: monospace; color: #4a90e2; font-weight: bold; }
        hr { border: 0; border-top: 2px solid #ffe4e9; margin: 20px 0; }
    </style>
</head>
<body>

<div class="box" id="auth-panel">
    <h1 id="main-title">Pixie-Net</h1>
    <div id="login-section">
        <input type="text" id="u" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
    </div>
    
    <div id="reg-section">
        <input type="text" id="reg-u" placeholder="Новый логин">
        <input type="password" id="reg-p" placeholder="Новый пароль">
        <input type="text" id="reg-inv" placeholder="Ваш инвайт-код">
    </div>

    <button onclick="processAction()" id="action-btn">ВОЙТИ</button>
    
    <span class="link" id="mode-toggle" onclick="toggleMode()">Нужна регистрация?</span>
    <div class="status" id="st-text" style="color: #888;">Ожидание...</div>
</div>

<div class="box" id="admin-panel">
    <h1 style="color: #ff85a2;">Админка</h1>
    <p>Привет, <span id="adm-name" style="font-weight:bold;">Admin</span>!</p>
    <hr>
    <p style="font-size: 14px; color: #666;">Создание ключей доступа:</p>
    <button onclick="makeInvite()" style="background: #a2d2ff;">ГЕНЕРИРОВАТЬ КОД</button>
    <div id="code-output" class="invite-display" style="display:none;"></div>
    
    <button onclick="location.reload()" style="background: #ffccd5; margin-top: 30px;">ВЫЙТИ</button>
</div>

<div class="box" id="user-panel">
    <h1>Личный кабинет</h1>
    <p>Добро пожаловать, <span id="usr-name" style="color:#ff85a2; font-weight:bold;"></span>!</p>
    <p style="color: #888;">Статус: Пользователь</p>
    <button onclick="location.reload()" style="background: #ccc;">ВЫЙТИ</button>
</div>

<script>
    const api = "https://eo4rau8gkt8py2a.m.pipedream.net";
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('login-section').style.display = isLogin ? 'block' : 'none';
        document.getElementById('reg-section').style.display = isLogin ? 'none' : 'block';
        document.getElementById('main-title').innerText = isLogin ? "Pixie-Net" : "Регистрация";
        document.getElementById('action-btn').innerText = isLogin ? "ВОЙТИ" : "СОЗДАТЬ АККАУНТ";
        document.getElementById('mode-toggle').innerText = isLogin ? "Нужна регистрация?" : "Уже есть аккаунт? Войти";
    }

    async function processAction() {
        const u = document.getElementById(isLogin ? 'u' : 'reg-u').value;
        const p = document.getElementById(isLogin ? 'p' : 'reg-p').value;
        const inv = document.getElementById('reg-inv').value;
        const st = document.getElementById('st-text');

        if(!u || !p) return alert("Заполни все поля!");
        st.innerText = "Связь с базой...";

        const payload = {
            action: isLogin ? 'login' : 'register',
            user: u,
            pass: p,
            invite: inv
        };

        try {
            const res = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('auth-panel').style.display = 'none';
                if (data.isAdmin) {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('adm-name').innerText = u;
                } else {
                    document.getElementById('user-panel').style.display = 'block';
                    document.getElementById('usr-name').innerText = u;
                }
            } else {
                st.innerText = "❌ " + data.message;
                st.style.color = "red";
            }
        } catch (e) {
            st.innerText = "❌ Ошибка сервера. Проверь Pipedream!";
        }
    }

    async function makeInvite() {
        const out = document.getElementById('code-output');
        out.style.display = 'block';
        out.innerText = "Создаю...";
        try {
            const res = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'generateCode' })
            });
            const data = await res.json();
            if(data.success) out.innerText = "КОД: " + data.code;
        } catch(e) { out.innerText = "Ошибка!"; }
    }
</script>
</body>
</html>
