<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Knox OS | 200 Units Database</title>
    <style>
        /* Стиль Frutiger Aero (Глянец и Стекло) */
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            color: white; overflow-x: hidden;
        }
        .container { padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px; padding: 20px; width: 90%; max-width: 800px;
            margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .scroll-box {
            height: 300px; overflow-y: auto; background: rgba(0,0,0,0.1);
            border-radius: 15px; padding: 10px; margin-top: 10px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1); border-radius: 10px;
            padding: 10px; margin: 5px 0; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid rgba(255,255,255,0.1);
        }
        .card img { width: 40px; height: 40px; }
        button {
            background: white; color: #007bff; border: none; padding: 10px 20px;
            border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #e0f2ff; transform: scale(1.05); }
        
        /* Эмулятор OLED */
        #oled-preview {
            background: #000; width: 128px; height: 64px; border: 3px solid #555;
            margin: 10px auto; position: relative; border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel" style="text-align: center;">
        <h2>📺 Монитор Трансляции (KNOX-100)</h2>
        <div id="oled-preview"></div>
        <p id="status-text" style="font-size: 12px;">Статус: Синхронизация...</p>
    </div>

    <div class="glass-panel">
        <h2>🔹 Детский Сад (1-100 Пикси)</h2>
        <div id="pixie-list" class="scroll-box"></div>
    </div>

    <div class="glass-panel">
        <h2>💠 Штаб Воспитателей (1-100 Взрослых)</h2>
        <div id="adult-list" class="scroll-box"></div>
    </div>
    
    <button onclick="generateFullLegacy()">♻️ ПЕРЕГЕНЕРИРОВАТЬ ВСЮ БАЗУ (200 UNIT)</button>
</div>

<script>
    // Тот самый скрипт, который ты просил посадить в сайт:
    
    let knoxDatabase = {
        children: [], 
        adults: [],   
        activePair: { child: null, adult: null }
    };

    function generateFullLegacy() {
        knoxDatabase.children = [];
        knoxDatabase.adults = [];

        for (let i = 1; i <= 100; i++) {
            // Создаем 100 детей
            knoxDatabase.children.push({
                id: i,
                name: "Пикси #" + i,
                art: "w512h5121380984456back-removebg-preview.png",
                power: Math.floor(Math.random() * 100)
            });

            // Создаем 100 взрослых
            knoxDatabase.adults.push({
                id: i,
                name: "Воспитатель #" + i,
                art: "Buble.png",
                iq: 150 + i
            });
        }

        // Назначаем первую пару активной для ESP32
        knoxDatabase.activePair.child = knoxDatabase.children[0];
        knoxDatabase.activePair.adult = knoxDatabase.adults[0];

        saveToStorage();
        renderAll();
    }

    function renderAll() {
        // Отрисовка списка детей
        document.getElementById('pixie-list').innerHTML = knoxDatabase.children.map(p => `
            <div class="card">
                <img src="${p.art}" style="filter: hue-rotate(${p.id * 10}deg)">
                <span>${p.name} (Сила: ${p.power})</span>
                <button onclick="setActive(${p.id}, 'child')">В ГАДЖЕТ</button>
            </div>
        `).join('');

        // Отрисовка списка взрослых
        document.getElementById('adult-list').innerHTML = knoxDatabase.adults.map(a => `
            <div class="card">
                <img src="${a.art}" style="opacity: 0.8">
                <span>${a.name} (IQ: ${a.iq})</span>
                <button onclick="setActive(${a.id}, 'adult')">В ГАДЖЕТ</button>
            </div>
        `).join('');

        updateOLED();
    }

    function setActive(id, type) {
        if(type === 'child') knoxDatabase.activePair.child = knoxDatabase.children[id-1];
        else knoxDatabase.activePair.adult = knoxDatabase.adults[id-1];
        
        saveToStorage();
        updateOLED();
        alert("Пара обновлена! ESP32 получит данные при включении.");
    }

    function updateOLED() {
        const oled = document.getElementById('oled-preview');
        const child = knoxDatabase.activePair.child;
        const adult = knoxDatabase.activePair.adult;

        oled.innerHTML = `
            <img src="${child.art}" style="width:25px; position:absolute; left:10px; top:20px; filter:invert(1);">
            <img src="${adult.art}" style="width:20px; position:absolute; right:10px; top:5px; filter:invert(1);">
            <div style="color:white; font-size:7px; position:absolute; bottom:5px; width:100%; text-align:center;">
                KNOX-100: ${child.name} & ${adult.name}
            </div>
        `;
    }

    function saveToStorage() {
        localStorage.setItem('knox_full_db', JSON.stringify(knoxDatabase));
    }

    // Загрузка
    window.onload = () => {
        const saved = localStorage.getItem('knox_full_db');
        if(saved) {
            knoxDatabase = JSON.parse(saved);
            renderAll();
        } else {
            generateFullLegacy();
        }
    };
</script>

</body>
</html>
