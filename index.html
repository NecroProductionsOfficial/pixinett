<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixie Project Interface</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
        }

        /* Кнопка-иконка в верхнем углу */
        #menu-trigger {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #menu-trigger img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        #menu-trigger:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Выезжающая панель */
        #side-panel {
            position: fixed;
            top: 0;
            left: -320px; /* Полностью скрыта */
            width: 300px;
            height: 100%;
            background: #ffffff;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            z-index: 1001;
            transition: left 0.4s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
        }

        #side-panel.active {
            left: 0; /* Выезжает */
        }

        /* Шапка внутри меню */
        .panel-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 20px;
        }

        .panel-header img {
            width: 100px;
            margin-bottom: 10px;
        }

        .panel-header h3 {
            margin: 0;
            color: #333;
            font-size: 1.2rem;
        }

        /* Ссылки в меню */
        .menu-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-items li {
            margin-bottom: 10px;
        }

        .menu-items li a {
            display: block;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
            font-weight: 500;
        }

        .menu-items li a:hover {
            background: #eef2ff;
            color: #4f46e5;
        }

        /* Затемнение фона */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            display: none;
            z-index: 999;
        }

        #overlay.active {
            display: block;
        }

        /* Контент страницы (для примера) */
        .content {
            padding: 100px 50px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="menu-trigger" onclick="toggleMenu()">
        <img src="Gemini_Generated_Image_ppv98ippv98ippv9.jpg" alt="Pixie">
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="side-panel">
        <div class="panel-header">
            <img src="Gemini_Generated_Image_ppv98ippv98ippv9.jpg" alt="Logo">
            <h3>Меню управления</h3>
        </div>
        <ul class="menu-items">
            <li><a href="#">📦 Библиотека деталей</a></li>
            <li><a href="#">💾 Сохраненные схемы</a></li>
            <li><a href="#">⚙️ Настройки ESP32</a></li>
            <li><a href="#">🎧 Звуковой редактор</a></li>
        </ul>
    </div>

    <div class="content">
        <h1>Твой проект Pixie</h1>
        <p>Нажми на иконку в углу, чтобы открыть настройки.</p>
    </div>

    <script>
        function toggleMenu() {
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            
            // Переключаем класс active
            panel.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Закрытие меню при нажатии клавиши Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('side-panel').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }
        });
    </script>

</body>
</html>
