<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Knox Station | Lab & Database</title>
    <style>
        :root { --aero: #007bff; --glass: rgba(255, 255, 255, 0.2); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #007bff, #00c6ff); color: white; min-height: 100vh; }
        
        /* Верхняя панель с кнопкой Входа */
        nav {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .container { padding: 100px 20px 40px; display: flex; flex-direction: column; align-items: center; }
        
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 25px;
            padding: 20px; width: 90%; max-width: 800px; margin-bottom: 20px;
        }

        .scroll-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.1); border-radius: 15px; padding: 10px; }
        
        .card {
            background: rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 10px;
            margin: 5px 0; display: flex; align-items: center; justify-content: space-between;
        }
        
        .card img { width: 45px; height: 45px; border-radius: 5px; }

        .btn { background: white; color: #007bff; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-login { background: #adff2f; color: #000; padding: 10px 25px; font-size: 16px; }

        #oled-preview { background: #000; width: 128px; height: 64px; border: 2px solid #555; margin: 10px auto; position: relative; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 20px; font-weight: bold;">KNOX STATION</div>
    <button class="btn btn-login" onclick="alert('Вход в систему...')">ВХОД</button>
</nav>

<div class="container">
    <div class="glass-panel" style="text-align: center;">
        <h3>📺 ТРАНСЛЯЦИЯ НА ГАДЖЕТ</h3>
        <div id="oled-preview">
            <p style="color: #333; font-size: 8px; margin-top: 25px;">OLED OFF</p>
        </div>
        <div id="active-info" style="font-size: 12px; color: #adff2f;">Пара не выбрана</div>
    </div>

    <div class="glass-panel">
        <h4>🔹 ДЕТСКИЙ САД (100 UNIT)</h4>
        <div id="pixie-list" class="scroll-box"></div>
    </div>

    <div class="glass-panel">
        <h4>💠 ВОСПИТАТЕЛИ (100 UNIT)</h4>
        <div id="adult-list" class="scroll-box"></div>
    </div>
</div>

<script>
    let db = { children: [], adults: [], active: { c: null, a: null } };

    // Генерируем базу
    function init() {
        for(let i=1; i<=100; i++) {
            db.children.push({ id: i, name: "Пикси #"+i, art: "w512h5121380984456back-removebg-preview.png" });
            db.adults.push({ id: i, name: "Куратор #"+i, art: "Buble.png" });
        }
        render();
    }

    function render() {
        // Отрисовка списка детей
        document.getElementById('pixie-list').innerHTML = db.children.map(p => `
            <div class="card">
                <img src="${p.art}" onerror="this.src='https://via.placeholder.com/45?text=P'">
                <span>${p.name}</span>
                <button class="btn" onclick="sendToOled(${p.id}, 'c')">В ГАДЖЕТ</button>
            </div>
        `).join('');

        // Отрисовка списка взрослых
        document.getElementById('adult-list').innerHTML = db.adults.map(a => `
            <div class="card">
                <img src="${a.art}" onerror="this.src='https://via.placeholder.com/45?text=A'">
                <span>${a.name}</span>
                <button class="btn" onclick="sendToOled(${a.id}, 'a')">В ГАДЖЕТ</button>
            </div>
        `).join('');
    }

    function sendToOled(id, type) {
        if(type === 'c') db.active.c = db.children[id-1];
        else db.active.a = db.adults[id-1];
        
        const oled = document.getElementById('oled-preview');
        const info = document.getElementById('active-info');
        
        let cArt = db.active.c ? `<img src="${db.active.c.art}" style="width:25px; position:absolute; left:10px; top:20px; filter:invert(1);">` : "";
        let aArt = db.active.a ? `<img src="${db.active.a.art}" style="width:20px; position:absolute; right:10px; top:5px; filter:invert(1);">` : "";
        
        oled.innerHTML = cArt + aArt;
        info.innerText = `Активны: ${db.active.c?.name || '...'} + ${db.active.a?.name || '...'}`;
    }

    init();
</script>

</body>
</html>
